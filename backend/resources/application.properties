# ===== SERVER =====
server.port=8080

# ===== DATABASE (H2 for development) =====
spring.datasource.url=jdbc:h2:mem:expenseiq
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===== FOR MYSQL (Production) =====
# spring.datasource.url=jdbc:mysql://localhost:3306/expenseiq
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
app.jwt.secret=ExpenseIQSuperSecretKey2025VeryLongRandomStringForJWTSigning
app.jwt.expiration=86400000

# ===== EMAIL (Gmail SMTP) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== OTP =====
app.otp.expiration=300000
app.otp.length=6

# ===== CORS =====
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,https://your-app.netlify.app